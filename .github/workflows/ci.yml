on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          repository: BigfootN/farbar
      - name: Update
        run: sudo apt-get update
      - name: Install curl
        run: sudo apt-get install curl
      - name: Install rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - name: Set rust path
        run: echo "~/.cargo/bin" >> "$GITHUB_PATH"
      - name: Install glib
        run: sudo apt-get install libglib2.0-dev
      - name: Install gtk3
        run: sudo apt-get install libgtk-3-dev
      - name: Install libsoup
        run: sudo apt-get install libsoup-3.0-dev
      - name: Install javascriptcoregtk
        run: sudo apt-get install libjavascriptcoregtk-4.1-dev
      - name: Install webkit2gtk
        run: sudo apt-get install libwebkit2gtk-4.1-dev
      - uses: actions/setup-node@v6
      - name: Install pnpm
        run: npm install -g pnpm@latest-10
      - name: Install npm packages
        run: npm install
      - name: Check typescript
        run: |
          npm install typescript
          npm tsc -b
      - name: Build deb package
        run: npm tauri build -b deb
